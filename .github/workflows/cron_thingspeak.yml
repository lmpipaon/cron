name: Ejecutor ThingSpeak 10min

on:
  schedule:
    # Se ejecuta cada 10 minutos (aprox)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Esto permite darle al botón "Play" manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar mi script
        env:
          # Aquí conectamos tus secretos con el programa
          WRITE_KEY: ${{ secrets.THINGSPEAK_KEY }}
          MY_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: python euskalmet_collector.py
