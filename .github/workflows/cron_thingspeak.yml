name: Ejecutor ThingSpeak 10min

on:
  schedule:
    # Se ejecuta cada 10 minutos (aprox)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Esto permite el botón "Run workflow"
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Configurar Python
        uses: actions/setup-python@v5 # Actualizado a v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Ejecutar mi script
        env:
          # Estas variables de entorno DEBEN coincidir con os.getenv en tu Python
          WRITE_KEY: ${{ secrets.THINGSPEAK_KEY }}
          MY_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: python euskalmet_collector.py
